<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>GitLab MR Reviewer</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        width: 300px;
        padding: 16px;
        background-color: #f8f9fa;
      }
      h2 {
        font-size: 16px;
        margin-top: 0;
      }
      .form-group {
        margin-bottom: 12px;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: bold;
        margin-bottom: 4px;
      }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 6px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 8px;
        background-color: #292961;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      button:hover {
        background-color: #1a1a4b;
      }
      .status {
        margin-top: 8px;
        font-size: 12px;
        color: green;
        display: none;
      }
    </style>
  </head>
  <body>
    <h2>GitLab 設定</h2>
    <div class="form-group">
      <label for="apiUrl">GitLab Base URL</label>
      <input type="text" id="apiUrl" placeholder="https://gitlab.example.com" />
    </div>
    <div class="form-group">
      <label for="patToken">Personal Access Token (PAT)</label>
      <input
        type="password"
        id="patToken"
        placeholder="glpat-xxxxxxxxxxxxxxxxxxxx"
      />
    </div>
    <div class="form-group">
    <label for="openaiApiKey">OpenAI API Key</label>
    <input type="password" id="openaiApiKey" placeholder="sk-...">
  </div>
    <button id="saveBtn">儲存設定</button>
    <div id="status" class="status">設定已儲存！</div>

    <script src="popup.js"></script>
  </body>
</html>
